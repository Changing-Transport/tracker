<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDC Comparison Dashboard | GIZ-SLOCAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="dashboard-header">
        <h1>NDC Comparison Dashboard</h1>
        <p class="header-description">Compare NDC transport commitments across countries and generations</p>
    </header>

    <main class="comparison-grid" id="comparison-grid">
        <!-- Flexible columns will be inserted here -->
    </main>

    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <p>Loading comparison data...</p>
    </div>

    <script src="script.js"></script>
</body>
