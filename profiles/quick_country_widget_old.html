<!-- NDC Explorer – improved: a11y, keyboard nav, highlight, debounce, clear, random pills -->
<div class="ndc-explorer-box">
  <h4 style="text-align:center; color:#003e5f;">Start typing a country to explore their climate commitments</h4>

  <div class="ndc-input-wrap">
    <input
      type="text"
      id="ndcCountrySearch"
      class="ndc-search-bar"
      placeholder="Type a country name..."
      autocomplete="off"
      aria-label="Search country"
      role="combobox"
      aria-autocomplete="list"
      aria-expanded="false"
      aria-controls="ndcSearchResults"
      aria-activedescendant=""
    />
    <button type="button" class="ndc-clear-btn" aria-label="Clear search" title="Clear">×</button>
  </div>

  <ul id="ndcSearchResults" class="ndc-autocomplete-list" role="listbox" aria-label="Country suggestions"></ul>

  <div id="ndcSuggestions" class="ndc-suggestions"></div>
</div>

  {name:"Samoa",code:"ws",              link:"https://changing-transport.org/ndc_country/samoa/"},
  {name:"Solomon Islands",code:"sb",    link:"https://changing-transport.org/ndc_country/solomon-islands/"},
  {name:"Tonga",code:"to",              link:"https://changing-transport.org/ndc_country/tonga/"},
  {name:"Tuvalu",code:"tv",             link:"https://changing-transport.org/ndc_country/tuvalu/"},
  {name:"Vanuatu",code:"vu",            link:"https://changing-transport.org/ndc_country/vanuatu/"}
  ];
  // ======================================

  // DOM
  const input = document.getElementById("ndcCountrySearch");
  const resultsList = document.getElementById("ndcSearchResults");
  const suggBox = document.getElementById("ndcSuggestions");
  const clearBtn = document.querySelector(".ndc-clear-btn");

  // Helpers
  const openLink = url => OPEN_IN_NEW_TAB ? window.open(url, "_blank", "noopener") : (location.href = url);
  const normalize = s => (s||"").normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  const escapeRx = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

  function highlight(text, query){
    if(!query) return text;
    const t = text ?? "";
    const normText = normalize(t);
    const normQ = normalize(query);
    const i = normText.indexOf(normQ);
    if(i === -1) return t;
    // insert <mark> around the matching raw substring
    return t.slice(0,i) + '<mark>' + t.slice(i, i+query.length) + '</mark>' + t.slice(i+query.length);
  }

  function pickRandom(list, n){
    const a = list.slice();
    const limit = Math.min(n, a.length);
    for (let i = 0; i < limit; i++){
      const j = i + Math.floor(Math.random() * (a.length - i));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a.slice(0, limit);
  }

  // Suggestions
  function renderSuggestions(){
    const picks = pickRandom(countries, NUM_SUGGESTIONS);
    suggBox.innerHTML = `<h5>Not sure where to start? Explore these countries</h5>
      <div class="ndc-sugg-pills">
        ${picks.map(p => `
          <button class="ndc-sugg-pill" data-link="${p.link}" aria-label="Open ${p.name}">
            <img src="${flag(p.code)}" alt="" aria-hidden="true" onerror="this.style.display='none'">
            <span>${p.name}</span>
          </button>
        `).join("")}
      </div>`;
    suggBox.querySelectorAll(".ndc-sugg-pill").forEach(btn => {
      btn.addEventListener('click', () => openLink(btn.getAttribute('data-link')));
    });
  }

  // Autocomplete
  let activeIndex = -1;      // keyboard highlight index
  let currentItems = [];     // current filtered list
  let debounceTimer = null;

  function renderResults(list, query){
    resultsList.innerHTML = "";
    activeIndex = -1;
    input.setAttribute('aria-activedescendant','');
    if(list.length === 0){
      const li = document.createElement("li");
      li.className = "no-result";
      li.textContent = "No results found";
      resultsList.appendChild(li);
      resultsList.style.display = "block";
      input.setAttribute('aria-expanded', 'true');
      return;
    }
    list.forEach((c, idx) => {
      const li = document.createElement("li");
      li.id = `ndc-opt-${idx}`;
      li.setAttribute("role","option");
      li.setAttribute("aria-selected","false");
      li.innerHTML = `
        <img src="${flag(c.code)}" alt="${c.name} flag" onerror="this.style.display='none'">
        <span>${highlight(c.name, query)}</span>
      `;
      li.addEventListener('mouseenter', () => setActive(idx));
      li.addEventListener('click', () => { openLink(c.link); hideResults(); });
      resultsList.appendChild(li);
    });
    resultsList.style.display = "block";
    input.setAttribute('aria-expanded', 'true');
  }

  function setActive(idx){
    const items = resultsList.querySelectorAll('li[role="option"]');
    items.forEach(el => el.setAttribute('aria-selected','false'));
    if(idx >= 0 && idx < items.length){
      items[idx].setAttribute('aria-selected','true');
      input.setAttribute('aria-activedescendant', items[idx].id);
      activeIndex = idx;
    }else{
      input.setAttribute('aria-activedescendant','');
      activeIndex = -1;
    }
  }

  function hideResults(){
    resultsList.style.display = "none";
    input.setAttribute('aria-expanded', 'false');
    setActive(-1);
  }

  function doFilter(){
    const qRaw = input.value.trim();
    const q = normalize(qRaw);
    if(!q){ hideResults(); return; }
    currentItems = countries.filter(c => normalize(c.name).includes(q));
    // cap displayed options; scroll for more if needed
    renderResults(currentItems.slice(0, 20), qRaw);
  }

  // Events
  input.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(doFilter, 120);
  });

  input.addEventListener("keydown", (e) => {
    const options = resultsList.querySelectorAll('li[role="option"]');
    if(e.key === "ArrowDown"){
      if(options.length){ setActive((activeIndex + 1) % options.length); }
      e.preventDefault();
    } else if(e.key === "ArrowUp"){
      if(options.length){ setActive((activeIndex - 1 + options.length) % options.length); }
      e.preventDefault();
    } else if(e.key === "Enter"){
      if(activeIndex >= 0 && currentItems[activeIndex]){
        openLink(currentItems[activeIndex].link);
        hideResults();
      } else if(currentItems.length){
        openLink(currentItems[0].link);
        hideResults();
      }
    } else if(e.key === "Escape"){
      hideResults();
    }
  });

  document.addEventListener("click", e => {
    if (!e.target.closest(".ndc-explorer-box")) hideResults();
  });

  clearBtn.addEventListener("click", () => {
    input.value = "";
    hideResults();
    input.focus();
  });

  // init
  renderSuggestions();
});
</script>
